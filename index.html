// 地図初期化
const map = L.map('map', {
  center: [30, 10],
  zoom: 2,
  zoomControl: true,
  maxBounds: [[-90, -180], [90, 180]],
  maxBoundsViscosity: 1.0,
  worldCopyJump: false,
  noWrap: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  maxZoom: 18,
}).addTo(map);

// 都市ごとにバンドをグループ化
function groupByLocation(bandList) {
  const groups = {};
  bandList.forEach(band => {
    const key = `${band.lat}_${band.lng}`;
    if (!groups[key]) groups[key] = { lat: band.lat, lng: band.lng, city: band.city, country: band.country, bands: [] };
    groups[key].bands.push(band);
  });
  return Object.values(groups);
}

let markers = [];

function createMarkerIcon(count) {
  const cls = count > 1 ? 'band-marker multiple' : 'band-marker';
  return L.divIcon({ className: '', html: `<div class="${cls}"></div>`, iconSize: [14, 14], iconAnchor: [7, 7] });
}

function buildPopupHTML(group) {
  const flagMap = { UK: '🇬🇧', USA: '🇺🇸', Canada: '🇨🇦', Australia: '🇦🇺', Germany: '🇩🇪', Sweden: '🇸🇪', Finland: '🇫🇮', Ireland: '🇮🇪', Spain: '🇪🇸', Italy: '🇮🇹', Norway: '🇳🇴', Brazil: '🇧🇷', Japan: '🇯🇵' };
  const flag = flagMap[group.country] || '🌍';
  let html = `<div class="popup-content">`;
  html += `<div class="popup-location">${flag} ${group.city}, ${group.country}</div>`;
  group.bands.forEach(b => {
    html += `<div class="band-entry">
      <div class="band-name">🎸 ${b.name}</div>
      <div class="band-meta">${b.genre === 'Solo' ? '活動開始' : '結成'}: ${b.formed}年 ／ ${b.members}</div>
      <div class="band-genre">${b.genre}</div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

function renderMarkers(filteredBands) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const groups = groupByLocation(filteredBands);
  groups.forEach(group => {
    const marker = L.marker([group.lat, group.lng], {
      icon: createMarkerIcon(group.bands.length),
    });
    marker.bindPopup(buildPopupHTML(group), { maxWidth: 300 });
    marker.addTo(map);
    markers.push(marker);
  });
}

// --- フィルター状態 ---
let activeGenre = 'all';
let activeDecade = 'all';
let searchQuery = '';

function getFiltered() {
  const q = searchQuery.toLowerCase();
  return bands.filter(b => {
    const genreOk = activeGenre === 'all' || b.genre === activeGenre;
    const decadeOk = activeDecade === 'all' || (b.formed >= activeDecade && b.formed < activeDecade + 10);
    const searchOk = !q || b.name.toLowerCase().includes(q) || b.city.toLowerCase().includes(q) || b.country.toLowerCase().includes(q) || b.members.toLowerCase().includes(q);
    return genreOk && decadeOk && searchOk;
  });
}

function applyFilters() {
  const filtered = getFiltered();
  renderMarkers(filtered);

  // ラベル更新
  const label = activeDecade === 'all' ? 'すべて' : `${activeDecade}年代`;
  document.getElementById('decadeLabel').textContent = label;
  const cnt = filtered.length;
  document.getElementById('decadeCount').textContent = cnt > 0 ? `${cnt}バンド表示中` : 'バンドなし';
}

// 初期描画
applyFilters();

// ジャンルフィルター
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeGenre = btn.dataset.genre;
    applyFilters();
  });
});

// --- 年代ボタン生成 ---
const decades = ['all', 1960, 1970, 1980, 1990, 2000, 2010, 2020];
const decadeBtns = document.getElementById('decadeBtns');

decades.forEach(d => {
  const btn = document.createElement('button');
  btn.className = 'decade-btn' + (d === 'all' ? ' active' : '');
  btn.textContent = d === 'all' ? 'すべて' : `${d}s`;
  btn.dataset.decade = d;
  btn.addEventListener('click', () => {
    stopPlay();
    setDecade(d === 'all' ? 'all' : Number(d));
  });
  decadeBtns.appendChild(btn);
});

function setDecade(d) {
  activeDecade = d;
  document.querySelectorAll('.decade-btn').forEach(b => {
    b.classList.toggle('active', String(b.dataset.decade) === String(d));
  });
  applyFilters();
}

// --- 自動再生 ---
let playTimer = null;
const decadeOrder = [1960, 1970, 1980, 1990, 2000, 2010, 2020];
let playIndex = 0;
const playBtn = document.getElementById('playBtn');

function stopPlay() {
  if (playTimer) { clearInterval(playTimer); playTimer = null; }
  playBtn.textContent = '▶';
}

playBtn.addEventListener('click', () => {
  if (playTimer) {
    stopPlay();
    return;
  }
  playBtn.textContent = '⏹';
  playIndex = 0;
  setDecade(decadeOrder[playIndex]);

  playTimer = setInterval(() => {
    playIndex++;
    if (playIndex >= decadeOrder.length) {
      stopPlay();
      setDecade('all');
      return;
    }
    setDecade(decadeOrder[playIndex]);
  }, 2000);
});

// --- 検索機能 ---
const searchInput   = document.getElementById('searchInput');
const searchClear   = document.getElementById('searchClear');
const searchDropdown= document.getElementById('searchDropdown');
const searchResultCount = document.getElementById('searchResultCount');

function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function updateDropdown(q) {
  if (!q) {
    searchDropdown.classList.remove('open');
    searchDropdown.innerHTML = '';
    searchResultCount.textContent = '';
    return;
  }
  const ql = q.toLowerCase();
  const matched = bands.filter(b =>
    b.name.toLowerCase().includes(ql) ||
    b.city.toLowerCase().includes(ql) ||
    b.country.toLowerCase().includes(ql) ||
    b.members.toLowerCase().includes(ql)
  ).slice(0, 12);

  searchResultCount.textContent = matched.length ? `${matched.length}件` : '該当なし';

  if (!matched.length) {
    searchDropdown.innerHTML = `<div class="dropdown-no-result">「${q}」に一致するアーティストが見つかりません</div>`;
    searchDropdown.classList.add('open');
    return;
  }

  searchDropdown.innerHTML = matched.map(b => `
    <div class="dropdown-item" data-lat="${b.lat}" data-lng="${b.lng}" data-name="${b.name}">
      <div class="dropdown-name">${highlight(b.name, q)}</div>
      <div class="dropdown-sub">${b.city}, ${b.country} ／ ${b.genre} ／ ${b.formed}年</div>
    </div>
  `).join('');
  searchDropdown.classList.add('open');

  searchDropdown.querySelectorAll('.dropdown-item').forEach(el => {
    el.addEventListener('click', () => {
      const lat = parseFloat(el.dataset.lat);
      const lng = parseFloat(el.dataset.lng);
      const name = el.dataset.name;
      searchInput.value = name;
      searchQuery = name;
      searchDropdown.classList.remove('open');
      searchClear.style.display = 'block';
      map.setView([lat, lng], 6, { animate: true });
      applyFilters();
      // 該当マーカーのポップアップを開く
      setTimeout(() => {
        markers.forEach(m => {
          const ll = m.getLatLng();
          if (Math.abs(ll.lat - lat) < 0.01 && Math.abs(ll.lng - lng) < 0.01) {
            m.openPopup();
          }
        });
      }, 600);
    });
  });
}

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  searchQuery = q;
  searchClear.style.display = q ? 'block' : 'none';
  updateDropdown(q);
  applyFilters();
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    searchDropdown.classList.remove('open');
  }
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  searchClear.style.display = 'none';
  searchResultCount.textContent = '';
  searchDropdown.classList.remove('open');
  applyFilters();
  searchInput.focus();
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrapper')) {
    searchDropdown.classList.remove('open');
  }
});
</script>
